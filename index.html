<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page">Docs SendyHost's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
      background: #0a0c10;
    }
    ::-webkit-scrollbar-track {
      background: #0a0c10;
    }
    ::-webkit-scrollbar-thumb {
      background: #2c3e66;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b82f6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #090a0f;
      color: #e8edf5;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 20% 30%, #0d1425 0%, #06070c 100%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 300px;
      background: radial-gradient(circle at 30% 0%, rgba(59,130,246,0.08) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    /* loading screen refined */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #090a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .loading-spinner-large {
      width: 56px;
      height: 56px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 20px rgba(59,130,246,0.2);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #6b8cae, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* navbar clean */
    .navbar {
      background: rgba(9, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,130,246,0.2);
      padding: 0.9rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffff, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    /* sidebar toggle refined */
    .sidebar-toggle {
      width: 32px;
      height: 26px;
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      padding: 4px 0;
    }

    .sidebar-toggle .bar {
      width: 100%;
      height: 2px;
      background: #8098b9;
      border-radius: 4px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.sidebar-open .sidebar-toggle .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); background: #3b82f6; }
    body.sidebar-open .sidebar-toggle .bar:nth-child(2) { opacity: 0; transform: scaleX(0.5); }
    body.sidebar-open .sidebar-toggle .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background: #3b82f6; }

    /* sidebar elegant */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: rgba(12, 14, 22, 0.98);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(59,130,246,0.25);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
      z-index: 200;
      padding: 6rem 1.5rem 2rem;
      box-shadow: -8px 0 40px rgba(0, 0, 0, 0.5);
    }

    body.sidebar-open .sidebar { transform: translateX(0); }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      transition: 0.25s;
    }
    body.sidebar-open .sidebar-overlay { opacity: 1; visibility: visible; }

    .sidebar ul { list-style: none; }
    .sidebar ul li { margin-bottom: 0.5rem; }
    .sidebar ul li a {
      color: #b4c8f0;
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1.2rem;
      border-radius: 14px;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .sidebar ul li a i { width: 24px; color: #5b8cce; font-size: 1.1rem; transition: 0.2s; }
    .sidebar ul li a:hover {
      background: rgba(59,130,246,0.15);
      color: white;
    }
    .sidebar ul li a:hover i { color: #3b82f6; transform: translateX(3px); }

    /* container */
    .container {
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* hero refined */
    .hero {
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
    }
    .hero h2 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f0f6ff, #8bb9fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .hero p {
      color: #8aa0c2;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .hero p span {
      background: rgba(59,130,246,0.15);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      border: 1px solid rgba(59,130,246,0.3);
    }

    /* tabs modern */
    .tabs {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }
    .tab {
      background: transparent;
      border: none;
      color: #8ba0c2;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 40px;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }
    .tab.active {
      background: #1e2b4a;
      color: white;
      box-shadow: 0 2px 12px rgba(59,130,246,0.3);
    }
    .tab:hover:not(.active) {
      color: white;
      background: rgba(59,130,246,0.1);
    }

    /* api grid refined */
    .api-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .api-card {
      background: rgba(15, 18, 28, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 20px;
      padding: 1.25rem;
      transition: all 0.25s ease;
      cursor: default;
    }

    .api-card:hover {
      border-color: rgba(59,130,246,0.4);
      background: rgba(18, 22, 35, 0.85);
      transform: translateY(-3px);
    }

    .api-info h3 {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #e2ecff;
    }
    .method-tag {
      background: #1e2e4a;
      color: #7cb0ff;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: 1px solid rgba(59,130,246,0.5);
    }
    .api-info p {
      color: #8d9fc7;
      font-size: 0.8rem;
      line-height: 1.5;
      margin-top: 0.5rem;
    }

    .play-button {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.4);
      color: #bcd0ff;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-family: 'Inter', monospace;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      width: fit-content;
      margin-top: 1rem;
    }
    .play-button:hover {
      background: #2563eb;
      color: white;
      border-color: white;
      box-shadow: 0 4px 14px rgba(59,130,246,0.4);
    }

    /* modal refined */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
      padding: 1rem;
    }
    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-dialog {
      background: #0f1322;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 28px;
      padding: 1.8rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      transform: scale(0.96);
      transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .modal.active .modal-dialog { transform: scale(1); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.2rem;
    }
    .modal-title h5 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #eef3ff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .modal-title span {
      color: #7a93bc;
      font-size: 0.8rem;
      display: block;
      margin-top: 0.3rem;
    }
    .btn-close {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #8ba0c2;
      font-size: 1.4rem;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ff8888;
    }

    .copy-section {
      background: #0a0e1a;
      border: 1px solid #253659;
      border-radius: 60px;
      padding: 0.4rem 0.6rem 0.4rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
    }
    #copyEndpointText {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #8daddd;
      overflow-x: auto;
      white-space: nowrap;
    }
    #copyUrlBtn {
      background: #1e2f4a;
      border: none;
      color: #bedcff;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
    }
    #copyUrlBtn:hover {
      background: #2c4b7a;
      color: white;
    }

    #paramForm input {
      width: 100%;
      background: #0a0f1c;
      border: 1px solid #253659;
      border-radius: 50px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1rem;
      color: #dce5f5;
      font-family: 'Inter', monospace;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    #paramForm input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }
    #paramForm input::placeholder {
      color: #4c5c7c;
    }

    #submitParamBtn {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      border: none;
      color: white;
      padding: 0.8rem;
      width: 100%;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.25rem;
    }
    #submitParamBtn:hover {
      transform: scale(1.01);
      box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #1e3a8a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 1rem auto;
    }

    #apiResponseContent {
      background: #070b14;
      border-radius: 20px;
      padding: 1rem;
      margin-top: 1.2rem;
      border: 1px solid #1f314a;
      overflow: auto;
      max-height: 400px;
    }
    #apiResponseContent pre {
      color: #c9dfff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #apiResponseContent img, #apiResponseContent video {
      border-radius: 16px;
      max-width: 100%;
    }

    .d-none { display: none !important; }

    /* mobile */
    @media (max-width: 640px) {
      .container { padding: 0 1rem; }
      .hero h2 { font-size: 1.6rem; }
      .api-list { grid-template-columns: 1fr; }
      .modal-dialog { padding: 1.2rem; }
      .tabs { gap: 0.4rem; }
      .tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
    }

    @media (max-width: 480px) {
      .sidebar { width: 260px; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-spinner-large"></div>
    <div class="loading-text">booting interface ...</div>
  </div>
  
  <header class="navbar">
    <div class="navbar-container">
      <span id="navname" class="brand">API Vault</span>
      <button id="sidebar-toggle" class="sidebar-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </header>

  <div id="sidebar" class="sidebar">
    <ul>
      <li><a id="github" href="https://github.com/X-Skycode" target="_blank"><i class="fab fa-github"></i> Github</a></li>
      <li><a id="contact" href="https://t.me/sendyhost" target="_blank"><i class="fas fa-paper-plane"></i> Contact</a></li>
      <li><a id="sourcecode" href="https://github.com/X-Skycode/selfbot" target="_blank"><i class="fas fa-code"></i> Source</a></li>
      <li><a href="#" id="theme-toggle" style="pointer-events: none; opacity: 0.6;"><i class="fas fa-moon"></i> Dark (fixed)</a></li>
    </ul>
  </div>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="container">
    <section class="hero">
      <h2 id="apiTitle"></h2>
      <p>⚠️ Simple, fast, glowing. perfect for bot services. default apikey: <span>sendy</span></p>
    </section>

    <section>
      <div class="tabs" id="tabs"></div>
      <div id="api-list" class="api-list"></div>
    </section>
  </div>

  <div class="modal" id="apiResponseModal">
    <div class="modal-dialog">
      <div class="modal-header">
        <div class="modal-title">
          <h5></h5>
          <span id="desc"></span>
        </div>
        <button class="btn-close" id="btn-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="copy-section d-none">
          <span id="copyEndpointText"></span>
          <button id="copyUrlBtn">copy</button>
        </div>
        <form id="paramForm"></form>
        <button id="submitParamBtn" class="d-none">→ execute</button>
        <div id="apiResponseLoading" class="loading-spinner d-none"></div>
        <div id="apiResponseContent" class="d-none"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        document.querySelector('.container').style.display = 'none';

        const tabsContainer = document.getElementById("tabs");
        const apiList = document.getElementById("api-list");
        const paramForm = document.getElementById("paramForm");
        const submitBtn = document.getElementById("submitParamBtn");
        const modal = document.getElementById("apiResponseModal");
        const responseEl = document.getElementById("apiResponseContent");
        const loadingEl = document.getElementById("apiResponseLoading");
        const urlsSection = document.querySelector(".copy-section");
        
        let currentEndpoint = "";
        let settings = {}, apis = {};
        let OpeningApi = "Orderkuota";

        try {
          const [settingsRes, apisRes] = await Promise.all([
            fetch("/set"),
            fetch("/endpoints")
          ]);
          settings = await settingsRes.json();
          apis = await apisRes.json();
        } catch (err) {
          console.error("Gagal memuat konfigurasi API:", err);
          document.getElementById('loading-screen').innerHTML = '<div style="color:#f87171;">Error: gagal load.</div>';
          return;
        }

        const setContent = (id, prop, val) => {
          const el = document.getElementById(id);
          if (el) el[prop] = val;
        };

        setContent("page", "textContent", "API Vault · " + (settings.apiTitle || "Docs"));
        setContent("apiTitle", "textContent", "// " + (settings.apiTitle || "API Documentation"));
        setContent("navname", "textContent", settings.apiTitle || "API Vault");

        const chlink = document.getElementById('sourcecode');
        if (chlink) chlink.href = settings.channelLink || '#';
        const githublink = document.getElementById('github');
        if (githublink) githublink.href = settings.githubLink || '#';
        const contactlink = document.getElementById('contact');
        if (contactlink) contactlink.href = settings.contactLink || '#';

        const categories = Object.keys(apis);
        if (categories.includes(OpeningApi)) {
          let idx = categories.indexOf(OpeningApi);
          categories.splice(idx, 1);
          categories.unshift(OpeningApi);
        } else { OpeningApi = null; }

        if (categories.length === 0) return;

        categories.forEach(key => {
          const btn = document.createElement("button");
          btn.className = "tab";
          btn.dataset.tab = key;
          btn.textContent = key;
          tabsContainer.appendChild(btn);
        });

        function renderAPIs(category) {
          apiList.innerHTML = "";
          if (!apis[category]) return;
          apis[category].sort((a, b) => a.name.localeCompare(b.name)).forEach((api, i) => {
            const card = document.createElement("div");
            card.className = "api-card";
            card.style.animationDelay = `${i * 0.05}s`;
            card.innerHTML = `
              <div class="api-info">
                <h3><span class="method-tag">GET</span> ${api.name}</h3>
                ${api.desc ? `<p>${api.desc}</p>` : ""}
              </div>
              <button class="play-button" data-endpoint="${api.path}" data-api="${api.name}" data-desc="${api.desc}">
                try it <i class="fas fa-chevron-right" style="font-size: 0.7rem;"></i>
              </button>
            `;
            apiList.appendChild(card);
          });
        }

        const defaultCategory = OpeningApi && apis[OpeningApi] ? OpeningApi : categories[0];
        renderAPIs(defaultCategory);
        const activeTab = [...tabsContainer.children].find(t => t.dataset.tab === defaultCategory);
        if (activeTab) {
          [...tabsContainer.children].forEach(t => t.classList.remove("active"));
          activeTab.classList.add("active");
        }

        tabsContainer.addEventListener("click", (e) => {
          const tab = e.target.closest(".tab");
          if (!tab) return;
          [...tabsContainer.children].forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          renderAPIs(tab.dataset.tab);
        });

        document.addEventListener("click", (e) => {
          const play = e.target.closest(".play-button");
          if (!play) return;
          const endpoint = play.dataset.endpoint;
          const apiName = play.dataset.api;
          const desc = play.dataset.desc;

          currentEndpoint = endpoint;
          paramForm.innerHTML = "";
          paramForm.classList.remove("d-none");
          submitBtn.classList.add("d-none");
          urlsSection.classList.add("d-none");
          loadingEl.classList.add("d-none");
          responseEl.classList.add("d-none");

          document.querySelector(".modal-header h5").innerHTML = `<span class="method-tag">GET</span> ${apiName}`;
          document.querySelector("#desc").textContent = desc || " ";

          if (endpoint.includes("?")) {
            const params = endpoint.split("?")[1].split("&");
            params.forEach(p => {
              const key = p.split("=")[0];
              paramForm.innerHTML += `<input type="text" id="${key}" name="${key}" placeholder="input ${key}" required />`;
            });
            submitBtn.classList.remove("d-none");
          } else {
            fetchAPI(endpoint);
          }
          modal.classList.add("active");
        });

        document.getElementById("btn-close").addEventListener("click", () => {
          modal.classList.remove("active");
        });
        modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("active"); });

        submitBtn.addEventListener("click", () => {
          if (!paramForm.checkValidity()) return paramForm.reportValidity();
          paramForm.classList.add("d-none");
          submitBtn.classList.add("d-none");
          loadingEl.classList.remove("d-none");

          let endpoint = currentEndpoint.split("?")[0] + "?";
          const inputs = paramForm.querySelectorAll("input");
          inputs.forEach((inp, i) => {
            endpoint += `${inp.name}=${encodeURIComponent(inp.value)}${i < inputs.length-1 ? "&" : ""}`;
          });
          fetchAPI(endpoint);
        });

        document.getElementById('copyUrlBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(document.getElementById('copyEndpointText').textContent);
        });

        document.getElementById('sidebar-toggle').addEventListener('click', () => {
          document.body.classList.toggle('sidebar-open');
        });
        document.getElementById('sidebar-overlay').addEventListener('click', () => {
          document.body.classList.remove('sidebar-open');
        });

        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.querySelector('.container').style.display = 'block';
          }, 500);
        }, 1000);

        function fetchAPI(endpoint) {
          const fullURL = window.location.origin + endpoint;
          responseEl.innerHTML = "";
          responseEl.classList.add("d-none");
          urlsSection.classList.remove("d-none");
          loadingEl.classList.remove("d-none");
          document.getElementById("copyEndpointText").textContent = fullURL;

          fetch(fullURL)
            .then(async res => {
              loadingEl.classList.add("d-none");
              const contentType = res.headers.get("content-type") || "";
              const data = await res.blob();
              const blobUrl = URL.createObjectURL(data);

              if (contentType.includes("json")) {
                try { 
                  const text = await data.text();
                  const json = JSON.parse(text);
                  responseEl.innerHTML = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                } catch { responseEl.innerHTML = `<pre>${await data.text()}</pre>`; }
              } else if (contentType.startsWith("image/")) {
                responseEl.innerHTML = `<img src="${blobUrl}" style="max-width:100%; border-radius:16px;" />`;
              } else if (contentType.startsWith("video/")) {
                responseEl.innerHTML = `<video controls style="width:100%; border-radius:16px;"><source src="${blobUrl}" /></video>`;
              } else if (contentType.startsWith("audio/")) {
                responseEl.innerHTML = `<audio controls><source src="${blobUrl}" /></audio>`;
              } else {
                responseEl.innerHTML = `<pre>${(await data.text()).substring(0, 800)}</pre>`;
              }
              responseEl.classList.remove("d-none");
            })
            .catch(err => {
              loadingEl.classList.add("d-none");
              responseEl.classList.remove("d-none");
              responseEl.innerHTML = `<pre style="color:#f87171;">Error: ${err.message}</pre>`;
            });
        }
      } catch (e) {
        document.getElementById('loading-screen').innerHTML = `<div style="color:#f87171;">Fatal: ${e}</div>`;
      }
    });
  </script>
</body>
</html>
